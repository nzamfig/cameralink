name: Test & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 프론트엔드 테스트·정합성 검사 ──────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared-protocol/package-lock.json
            receiver-pwa/package-lock.json

      - name: shared-protocol 의존성 설치
        run: npm ci
        working-directory: shared-protocol

      - name: shared-protocol 테스트
        run: npm test
        working-directory: shared-protocol

      - name: 송신기 프로토콜 복사본 동기화 검증
        # transmitter/static/js/shared-protocol/ 이 shared-protocol 빌드 산출물과
        # 일치하는지 확인. 불일치 = 프로토콜 드리프트 → 디코딩 전체 실패 위험
        run: |
          npm run build --prefix shared-protocol
          node scripts/sync-protocol.mjs --check

      - name: receiver-pwa 타입 검사
        run: |
          npm ci
          npm run typecheck
        working-directory: receiver-pwa

  # ── 송신기(Spring Boot) 테스트 ─────────────────────────────────
  test-transmitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle 테스트
        run: |
          chmod +x gradlew
          ./gradlew test --console=plain
        working-directory: transmitter

  # ── 수신기 PWA 빌드 (테스트 통과 후) ───────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-transmitter]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared-protocol/package-lock.json
            receiver-pwa/package-lock.json

      - name: shared-protocol 의존성 설치
        run: npm ci
        working-directory: shared-protocol

      - name: receiver-pwa 빌드
        run: |
          npm ci
          npm run build
        working-directory: receiver-pwa
        # build 스크립트는 'vite build' (tsc는 test-frontend 잡의 typecheck에서 수행)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: receiver-pwa/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
