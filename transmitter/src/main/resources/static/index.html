<!DOCTYPE html>
<!--
  @file index.html
  @description CameraLink 송신기 메인 HTML.
  Spring Boot 정적 리소스로 서빙되며 별도 빌드 없이 ES 모듈로 동작한다.

  화면 1: #file-select-view — 파일 선택 (드래그&드롭 + 버튼)
  화면 2: #transmit-view    — QR 격자 애니메이션 전송

  관계:
    css/style.css  → 스타일
    js/main.js     → ES 모듈 진입점 (type="module")
    Spring Boot    → localhost:8080에서 서빙
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- OS 다크모드가 QR 색상을 반전하지 않도록 강제 라이트 모드 -->
  <meta name="color-scheme" content="light">
  <title>CameraLink — 광학 파일 전송</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─────────────────────────────────────────────
       화면 1: 파일 선택
       ───────────────────────────────────────────── -->
  <div id="file-select-view">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-text">
        <h1>CameraLink</h1>
        <p>네트워크 없이, 화면과 카메라로 파일을 전송하세요</p>
      </div>
    </div>

    <div class="card">
      <!-- 드래그&드롭 영역 -->
      <div id="drop-zone">
        <svg class="drop-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 16V4M12 4L7 9M12 4l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 16v2.5A1.5 1.5 0 0 0 5.5 20h13a1.5 1.5 0 0 0 1.5-1.5V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>파일을 이곳에 끌어다 놓거나</p>
        <button id="file-btn" type="button">파일 선택</button>
        <!-- hidden input: 파일 다이얼로그 트리거용 -->
        <input type="file" id="file-input" hidden aria-label="파일 선택">
      </div>

      <!-- 파일 선택 후 표시되는 정보 패널 -->
      <div id="file-info" hidden>
        <div class="file-info-row">
          <svg class="file-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 3.5h7l5 5V19a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 6 19V5A1.5 1.5 0 0 1 7 3.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M14 3.5V8a1 1 0 0 0 1 1h4.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          <div class="file-info-text">
            <span id="file-name" aria-label="파일명"></span>
            <span class="file-meta">
              <span id="file-size" aria-label="파일 크기"></span>
              <span id="est-time"  aria-label="예상 전송 시간"></span>
            </span>
          </div>
        </div>
        <button id="start-btn" type="button">전송 시작</button>
      </div>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────
       화면 2: 전송 애니메이션
       ───────────────────────────────────────────── -->
  <div id="transmit-view" hidden>

    <!-- QR 격자 캔버스 — GridRenderer가 렌더링 -->
    <canvas id="qr-canvas" aria-label="QR 코드 전송 화면"></canvas>

    <!-- 창이 숨겨졌을 때 경고 배너 -->
    <div id="visibility-hint" hidden role="alert">
      창을 보이도록 유지하세요 — 숨겨지면 전송이 중단됩니다
    </div>

    <!-- 전송 제어 버튼 — QR 캔버스 "아래" 별도 툴바 영역 (그리드/fiducial을 가리지 않음) -->
    <div id="controls" role="toolbar" aria-label="전송 제어">
      <button id="pip-btn" type="button" title="항상 위 창으로 전환 (Chrome 116+ 필요)">
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="4" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <rect x="12" y="11" width="7" height="5" rx="1" fill="currentColor"/>
        </svg>
        <span class="btn-label">항상 위</span>
      </button>
      <button id="stop-btn" type="button" title="전송 중지 (ESC)">
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="5" width="14" height="14" rx="2.5" fill="currentColor"/>
        </svg>
        <span class="btn-label">중지</span>
      </button>
    </div>

  </div>

  <!-- ES 모듈 진입점 — type="module"로 임포트 체인 시작 -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
